# GCP Cloud Run profile.
# Datasource URL is set via DB_URL env, which the deploy script wires to
# jdbc:postgresql:///autosales?host=/cloudsql/<INSTANCE_CONNECTION_NAME>
# Cloud Run mounts the Cloud SQL Unix socket at /cloudsql/... when
# --add-cloudsql-instances is passed. Standard postgres JDBC driver
# supports host=/path for Unix sockets, so no extra dependency needed.

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# AI surfaces are intentionally disabled in Phase A — Phase B will
# reintroduce them via Vertex AI / Gemini. Empty keys cause the LlmClient
# to skip provider registration and the AgentService /info to report
# unavailable, so both widgets auto-hide in the UI.
groq:
  api-key: ""
gemini:
  api-key: ""
together:
  api-key: ""
mistral:
  api-key: ""
claude:
  api-key: ""
openclaw:
  gateway-url: ""
  gateway-token: ""

logging:
  level:
    root: INFO
    com.autosales: INFO
    org.hibernate.SQL: WARN
