# GCP Cloud Run profile.
# Datasource URL is set via DB_URL env, which the deploy script wires to
# jdbc:postgresql:///autosales?host=/cloudsql/<INSTANCE_CONNECTION_NAME>
# Cloud Run mounts the Cloud SQL Unix socket at /cloudsql/... when
# --add-cloudsql-instances is passed. Standard postgres JDBC driver
# supports host=/path for Unix sockets, so no extra dependency needed.

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# AI surfaces — Phase B switches the agent to Vertex AI Gemini.
# Custom-chat free-tier providers (groq/together/mistral) stay disabled here;
# the AI Assistant widget auto-hides when its providers aren't configured.
# OpenClaw stays disabled: agent.provider=gemini selects GeminiAgentService.
groq:
  api-key: ""
together:
  api-key: ""
mistral:
  api-key: ""
claude:
  api-key: ""
openclaw:
  gateway-url: ""
  gateway-token: ""

# Vertex AI Gemini — backend service account has roles/aiplatform.user;
# auth via Application Default Credentials, no API key needed.
# api-key is intentionally blank here because we use Vertex AI (project-based),
# not Google AI Studio (api-key-based).
agent:
  provider: gemini
gemini:
  api-key: ""
  project-id: ${GEMINI_PROJECT_ID}
  location: ${GEMINI_LOCATION:us-central1}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

logging:
  level:
    root: INFO
    com.autosales: INFO
    org.hibernate.SQL: WARN
