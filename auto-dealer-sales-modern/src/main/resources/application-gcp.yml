# GCP Cloud Run profile.
# Datasource URL is set via DB_URL env, which the deploy script wires to
# jdbc:postgresql:///autosales?host=/cloudsql/<INSTANCE_CONNECTION_NAME>
# Cloud Run mounts the Cloud SQL Unix socket at /cloudsql/... when
# --add-cloudsql-instances is passed. Standard postgres JDBC driver
# supports host=/path for Unix sockets, so no extra dependency needed.

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# AI surfaces — Phase B switches the agent to Vertex AI Gemini.
# Custom-chat free-tier providers (groq/together/mistral) stay disabled here;
# the AI Assistant widget auto-hides when its providers aren't configured.
# OpenClaw stays disabled: agent.provider=gemini selects GeminiAgentService.
groq:
  api-key: ""
together:
  api-key: ""
mistral:
  api-key: ""
claude:
  api-key: ""
openclaw:
  gateway-url: ""
  gateway-token: ""

# Vertex AI Gemini — backend service account has roles/aiplatform.user;
# auth via Application Default Credentials, no API key needed.
# api-key is intentionally blank here because we use Vertex AI (project-based),
# not Google AI Studio (api-key-based).
agent:
  provider: gemini
gemini:
  api-key: ""
  project-id: ${GEMINI_PROJECT_ID}
  location: ${GEMINI_LOCATION:us-central1}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

# B3a + B3b — BigQuery analytics layer.
# Activated only when analytics.bigquery.enabled=true. Audit rows mirror
# async via @EventListener; cost dashboard reads Cloud Billing's BQ export.
# Service account autosales-app needs roles/bigquery.dataEditor on the
# autosales_analytics dataset and roles/bigquery.jobUser on the project.
analytics:
  bigquery:
    enabled: ${BIGQUERY_ENABLED:true}
    project-id: ${GEMINI_PROJECT_ID}
    dataset: ${BIGQUERY_DATASET:autosales_analytics}
    audit-table: ${BIGQUERY_AUDIT_TABLE:tool_call_audit}
    # Empty until Cloud Billing → BQ export is enabled. Set to e.g.
    # auto-sales-ai-enabled.billing_export.gcp_billing_export_v1_<billing_id>
    billing-table: ${BIGQUERY_BILLING_TABLE:}
    gemini-service-name: ${BIGQUERY_GEMINI_SERVICE:Vertex AI API}

logging:
  level:
    root: INFO
    com.autosales: INFO
    org.hibernate.SQL: WARN
