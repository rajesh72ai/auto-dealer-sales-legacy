server:
  port: 8480

spring:
  application:
    name: autosales
  datasource:
    url: jdbc:postgresql://localhost:5432/autosales
    username: autosales
    password: autosales
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET:autosales-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 28800000
  refresh-expiration: 86400000

logging:
  level:
    com.autosales: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
