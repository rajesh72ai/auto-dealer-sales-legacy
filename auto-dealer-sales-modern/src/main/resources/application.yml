server:
  port: 8480

spring:
  application:
    name: autosales
  datasource:
    url: jdbc:postgresql://localhost:5432/autosales
    username: autosales
    password: autosales
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET:autosales-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 28800000
  refresh-expiration: 86400000

api:
  key: ${API_KEY:autosales-operator-key-change-in-prod}

groq:
  api-key: ${GROQ_API_KEY:}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

together:
  api-key: ${TOGETHER_API_KEY:}
  model: ${TOGETHER_MODEL:meta-llama/Llama-3.3-70B-Instruct-Turbo}

mistral:
  api-key: ${MISTRAL_API_KEY:}
  model: ${MISTRAL_MODEL:mistral-small-latest}

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: ${CLAUDE_MODEL:claude-sonnet-4-6}

openclaw:
  gateway-url: ${OPENCLAW_GATEWAY_URL:http://localhost:18789}
  gateway-token: ${OPENCLAW_GATEWAY_TOKEN:openclaw-autosales-local}

llm:
  default-provider: ${LLM_DEFAULT_PROVIDER:groq}

agent:
  default-skill: autosales-api
  max-rounds: 20
  timeout-seconds: 180
  daily-token-quota-per-user: ${AGENT_DAILY_TOKEN_QUOTA:200000}
  # Phase-3 Safe Action Framework
  action:
    # Confirmation token TTL — how long a proposal can sit before the user must
    # re-prompt. 5 minutes balances think-time against stale-state risk.
    token-ttl-seconds: ${AGENT_ACTION_TOKEN_TTL:300}
    # Undo window — after a reversible action executes, user has this many
    # seconds to click Undo and trigger the compensation. Was 10s in v1
    # scaffold; bumped to 60s after dogfooding feedback (10s too short for
    # thoughtful users).
    undo-window-seconds: ${AGENT_ACTION_UNDO_WINDOW:60}
  # USD pricing per 1,000,000 tokens. Defaults: Claude Sonnet 4.6 published rates.
  # Override via env when rates change or when using a different model.
  pricing:
    input-per-million:  ${AGENT_PRICE_INPUT_PER_M:3.00}
    output-per-million: ${AGENT_PRICE_OUTPUT_PER_M:15.00}
    cache-read-per-million:  ${AGENT_PRICE_CACHE_READ_PER_M:0.30}
    cache-write-5m-per-million: ${AGENT_PRICE_CACHE_WRITE_5M_PER_M:3.75}
    cache-write-1h-per-million: ${AGENT_PRICE_CACHE_WRITE_1H_PER_M:6.00}
    currency: USD
  # Anthropic admin API — gives us REAL token counts and dollar spend for an
  # org-wide dashboard. Admin key is separate from the standard API key and
  # MUST be backend-only. Never expose to frontend. Leave unset to disable the
  # actuals endpoint (page degrades gracefully).
  anthropic-admin:
    key: ${ANTHROPIC_ADMIN_API_KEY:}
    base-url: ${ANTHROPIC_ADMIN_BASE_URL:https://api.anthropic.com}
    api-version: ${ANTHROPIC_ADMIN_API_VERSION:2023-06-01}

logging:
  level:
    com.autosales: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
