spring:
  datasource:
    url: jdbc:h2:mem:autosales_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-testing
  expiration: 3600000
  refresh-expiration: 7200000
