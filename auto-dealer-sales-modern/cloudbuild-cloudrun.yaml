# Cloud Build config for the Spring Boot backend image.
# Used because `gcloud builds submit --tag` doesn't accept a non-default
# Dockerfile name, and we keep `Dockerfile` for the local Compose stack
# while using `Dockerfile.cloudrun` for the GCP deploy.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '-t'
      - '${_IMAGE}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

images:
  - '${_IMAGE}'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: 900s

substitutions:
  _IMAGE: 'us-central1-docker.pkg.dev/auto-sales-ai-enabled/autosales/backend:latest'
