server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Reverse-proxy /api/* to the backend Cloud Run service.
    # ${BACKEND_URL} is substituted by docker-entrypoint-cloudrun.sh at startup.
    #
    # Cloud Run does HTTPS-only host-based routing on its edge: every request
    # MUST have (1) a TLS SNI matching the target service hostname, and
    # (2) an HTTP Host header matching the same. The defaults nginx sends
    # (Host = $host = our frontend hostname; no SNI) trigger 502s. Three lines
    # below fix it:
    #   - $proxy_host is the host parsed from `proxy_pass` (i.e., the backend)
    #   - proxy_ssl_server_name on enables SNI on the upstream TLS handshake
    #   - proxy_ssl_name pins the SNI value to the backend host
    location /api/ {
        proxy_pass             ${BACKEND_URL};
        proxy_http_version     1.1;
        proxy_set_header       Host              $proxy_host;
        proxy_ssl_server_name  on;
        proxy_ssl_name         $proxy_host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Authorization     $http_authorization;
        # SSE-friendly: no buffering, long timeouts (Phase B agent streaming).
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;
    }

    # SPA fallback — any non-/api path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sensible static asset caching.
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
